services:
  # Telegram Bot Service (Production)
  bot:
    build:
      context: .
      target: production
    container_name: transcrib_hglobalcom_bot_bot_prod
    env_file:
      - .env.prod
    environment:
      - ENV=production
      - TRANSCRIBER_URL=http://transcriber:8001
    restart: always
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      transcriber:
        condition: service_started
    networks:
      - bot_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Local Speech-to-Text Service (faster-whisper, Production)
  transcriber:
    build:
      context: ./transcriber
    container_name: transcrib_hglobalcom_bot_transcriber_prod
    environment:
      - WHISPER_MODEL_SIZE=${WHISPER_MODEL_SIZE:-small}
      - WHISPER_COMPUTE_TYPE=${WHISPER_COMPUTE_TYPE:-int8}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-ru}
      - WHISPER_BEAM_SIZE=${WHISPER_BEAM_SIZE:-5}
    volumes:
      - whisper_models:/models
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bot_network
    deploy:
      resources:
        # При WHISPER_MODEL_SIZE=medium/large лимиты нужно увеличить (4G+/6G+)
        limits:
          memory: 2G
          cpus: '1.5'
        reservations:
          memory: 1G
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Service (Production)
  redis:
    image: redis:7-alpine
    container_name: transcrib_hglobalcom_bot_redis_prod
    restart: always
    volumes:
      - redis_data:/data
    command: >
      sh -c "
      if [ -n \"$${REDIS_PASSWORD}\" ]; then
        redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass $${REDIS_PASSWORD}
      else
        redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
      fi
      "
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$${REDIS_PASSWORD}\" ]; then
          redis-cli -a $${REDIS_PASSWORD} ping
        else
          redis-cli ping
        fi
        "
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bot_network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # PostgreSQL Service (Production)
  postgres:
    image: postgres:15-alpine
    container_name: transcrib_hglobalcom_bot_postgres_prod
    env_file:
      - .env.prod
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bot_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

networks:
  bot_network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  whisper_models:
    driver: local
