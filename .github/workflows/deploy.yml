# GitHub Actions workflow для автоматического деплоя на сервер
# Запускается при пуше в main ветку
#
# Необходимые секреты (Settings → Secrets and variables → Actions):
# - SERVER_HOST: IP-адрес или домен сервера
# - SERVER_USER: имя пользователя SSH (например, deploy)
# - SSH_PRIVATE_KEY: приватный SSH ключ (содержимое файла ~/.ssh/id_ed25519)
# - PROJECT_PATH: путь к проекту на сервере (например, /home/deploy/aiogram_starter_kit)

name: Deploy to Production

on:
  push:
    branches: [main]

  # Позволяет запускать workflow вручную из вкладки Actions
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Bot
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            echo "=== Начало деплоя ==="
            cd ${{ secrets.PROJECT_PATH }}

            echo "=== Git pull ==="
            git pull origin main

            echo "=== Запуск деплоя ==="
            make ci-deploy

            echo "=== Проверка здоровья сервисов ==="
            make ci-health

            echo "=== Деплой завершен успешно ==="
